<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusTrack</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 280px;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    .header {
      background: linear-gradient(135deg, #6c63ff, #48b2e8);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      color: white;
    }

    .header .bolt { font-size: 20px; }

    .body { padding: 16px; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #aaa;
      flex-shrink: 0;
    }

    .dot.connected { background: #4caf50; }
    .dot.disconnected { background: #f44336; }

    .status-text { font-size: 13px; color: #bbb; }

    .current-url {
      background: #252545;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      color: #9090c0;
      word-break: break-all;
      min-height: 40px;
      display: flex;
      align-items: center;
      margin-bottom: 14px;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #6c63ff;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: #5a52e0; }

    .footer {
      padding: 10px 16px;
      border-top: 1px solid #2a2a4a;
      font-size: 11px;
      color: #555;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="bolt">⚡</span>
    <h1>FocusTrack</h1>
  </div>
  <div class="body">
    <div class="status-row">
      <div class="dot" id="dot"></div>
      <span class="status-text" id="statusText">Verificando conexión…</span>
    </div>
    <div class="current-url" id="currentUrl">—</div>
    <button class="btn" id="sendBtn">Enviar URL ahora</button>
  </div>
  <div class="footer">FocusTrack v1.0 — localhost:27432</div>
  <script src="popup.js"></script>
</body>
</html>
